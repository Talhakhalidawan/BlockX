<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BlockX Popup</title>
    <link rel="stylesheet" href="popup.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="popup-container">
        <!-- Header -->
        <header class="popup-header">
            <div class="brand">
                <img src="icons/icon128.png" alt="Logo" class="logo">
                <span class="brand-name">BlockX</span>
            </div>
            <button id="open-settings" class="icon-btn" title="Settings">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"></path><circle cx="12" cy="12" r="3"></circle></svg>
            </button>
        </header>

        <main class="popup-content">
            <!-- Context Action -->
            <div id="context-action" class="context-card">
                <div class="card-body">
                    <div id="site-info" class="site-info">
                        <span id="display-name" class="domain-text">Detecting...</span>
                        <span id="context-type" class="type-badge">Domain</span>
                    </div>
                    <button id="block-btn" class="btn btn-danger">
                        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"></line></svg>
                        Block this <span id="block-type-label">Site</span>
                    </button>
                </div>
            </div>

            <!-- Quick Add Toggle -->
            <button id="toggle-quick-add" class="expand-btn">
                <span>Quick Add Manually</span>
                <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
            </button>

            <!-- Quick Add Input (Collapsible) -->
            <div id="quick-add-panel" class="quick-add-panel hidden">
                <div class="input-group">
                    <input type="text" id="quick-input" placeholder="Enter domain or keyword...">
                    <button id="quick-save-btn" class="btn btn-primary">Add</button>
                </div>
                <p class="help-text">Auto-detects: domains (e.g. site.com) or keywords.</p>
            </div>
        </main>

        <!-- Status Indicator -->
        <footer class="popup-footer">
            <div class="status">
                <span class="dot pulse"></span>
                <span>Real-time Protection Active</span>
            </div>
        </footer>
    </div>
    <script src="config.js"></script>
    <script src="popup.js"></script>
</body>
</html>
