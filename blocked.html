    }
    h1 {
      font-size: 24px;
      margin: 0 0 10px 0;
      color: #d9534f;
    }
    p {
      font-size: 15px;
      color: #666;
      line-height: 1.5;
      margin: 0;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🛡️</div>
    <h1>Content Blocked</h1>
